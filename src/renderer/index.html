<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SyncPad</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div>
            <p class="eyebrow">SyncPad</p>
            <h1>Notes</h1>
            <p class="header-hint">Private live notes across your devices.</p>
          </div>
          <button id="new-note-button" class="primary-button">New note</button>
        </div>

        <div class="sidebar-actions">
          <button id="export-backup-button" class="ghost-button">Export</button>
          <button id="import-backup-button" class="ghost-button">Import</button>
          <input id="import-backup-input" type="file" accept="application/json" hidden />
        </div>

        <label class="search-shell">
          <span>Search</span>
          <input id="search-input" type="search" placeholder="Search notes" />
        </label>

        <div id="notes-list" class="notes-list"></div>
      </aside>

      <main class="editor-root">
        <header class="editor-header">
          <div>
            <p id="sync-status" class="eyebrow" data-tone="local">Local sync</p>
            <h2 id="editor-heading">Select or create a note</h2>
            <p class="header-hint">Markdown-friendly writing with live preview and instant private sync.</p>
          </div>
          <div class="header-actions">
            <div class="mode-switcher" role="group" aria-label="Editor view mode">
              <button class="mode-button" data-mode="edit" aria-pressed="false">Edit</button>
              <button class="mode-button" data-mode="split" aria-pressed="true">Split</button>
              <button class="mode-button" data-mode="preview" aria-pressed="false">Preview</button>
            </div>
            <div class="editor-actions">
              <button id="duplicate-note-button" class="ghost-button" disabled>Duplicate</button>
              <button id="delete-note-button" class="ghost-button ghost-button--danger" disabled>Delete</button>
            </div>
          </div>
        </header>

        <section class="editor-toolbar">
          <label class="toolbar-field">
            <span>Find</span>
            <input id="find-input" type="search" placeholder="Find in note" />
          </label>
          <label class="toolbar-field">
            <span>Replace</span>
            <input id="replace-input" type="text" placeholder="Replace with" />
          </label>
          <div class="toolbar-actions">
            <button id="find-next-button" class="ghost-button">Next</button>
            <button id="replace-button" class="ghost-button">Replace</button>
            <button id="replace-all-button" class="ghost-button">Replace all</button>
            <button id="wrap-toggle-button" class="ghost-button">Wrap on</button>
            <button id="zoom-out-button" class="ghost-button">A-</button>
            <button id="zoom-reset-button" class="ghost-button">100%</button>
            <button id="zoom-in-button" class="ghost-button">A+</button>
          </div>
        </section>

        <section id="editor-shell" class="editor-shell" data-mode="split">
          <div class="editor-pane">
            <input id="title-input" class="title-input" type="text" placeholder="Untitled note" disabled />
            <textarea
              id="content-input"
              class="content-input"
              placeholder="Start typing in Markdown..."
              disabled
            ></textarea>
          </div>

          <div class="preview-pane">
            <div class="preview-pane__header">Markdown preview</div>
            <article id="preview-panel" class="preview-panel">
              <p class="preview-empty">Nothing to preview yet.</p>
            </article>
          </div>
        </section>

        <footer class="editor-footer">
          <span id="save-state">No note selected</span>
          <div class="footer-meta">
            <span id="note-stats">0 words | 0 characters</span>
            <span id="caret-position">Ln 1, Col 1</span>
            <span id="zoom-label">100%</span>
            <span id="server-origin"></span>
            <span id="storage-path"></span>
          </div>
        </footer>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
